name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  JUCE_VERSION: "8.0.4"
  BUILD_TYPE: Release

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libjack-jackd2-dev \
            ladspa-sdk libcurl4-openssl-dev \
            libfreetype-dev libfontconfig1-dev \
            libx11-dev libxcomposite-dev libxcursor-dev libxext-dev \
            libxinerama-dev libxrandr-dev libxrender-dev \
            libwebkit2gtk-4.1-dev libglu1-mesa-dev mesa-common-dev

      - name: Cache JUCE
        id: cache-juce
        uses: actions/cache@v4
        with:
          path: JUCE
          key: juce-${{ env.JUCE_VERSION }}

      - name: Fetch JUCE
        if: steps.cache-juce.outputs.cache-hit != 'true'
        run: git clone --depth 1 --branch ${{ env.JUCE_VERSION }} https://github.com/juce-framework/JUCE.git

      - name: Configure
        run: cmake -S . -B build -DJUCE_PATH=${{ github.workspace }}/JUCE -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

      - name: Stage artefacts
        shell: bash
        run: |
          set -e
          mkdir -p staged
          art="build/PoleZero_artefacts/${{ env.BUILD_TYPE }}"
          for kind in VST3 AU Standalone; do
            if [ -d "$art/$kind" ]; then
              cp -R "$art/$kind" staged/ || true
            fi
          done
          ls -la staged

      - name: Upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: PoleZero-${{ runner.os }}
          path: staged
          if-no-files-found: error

  release:
    name: Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artefacts
        uses: actions/download-artifact@v4
        with:
          path: artefacts

      - name: Zip per-platform bundles
        run: |
          set -e
          mkdir -p release
          cd artefacts
          for d in */; do
            name="${d%/}"
            (cd "$d" && zip -r "../../release/${name}.zip" .)
          done
          ls -la ../release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.zip
          generate_release_notes: true
